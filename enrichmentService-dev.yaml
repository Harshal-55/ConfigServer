logging:
  level:
    root: INFO
    com.bankguard.enrichmentservice: DEBUG

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
    fetch-registry: true
    register-with-eureka: true

  instance:
    prefer-ip-address: true

external:
  alertcase-service:
    url: http://alert-case-service

  decision-engine-service:
    url: http://decision-engine-service
